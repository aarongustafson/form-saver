<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>form-saver via esm.sh</title>
		<link rel="stylesheet" href="./styles.css" />
		<style>
			/* Demo-specific styles */
		</style>
	</head>
	<body>
		<h1>esm.sh CDN sanity check</h1>
		<p>
			This page loads the component class from <code>esm.sh</code> and
			registers it manually.
		</p>

		<form-saver>
			<form action="/demo-contact" method="post">
				<label>
					Name
					<input name="name" />
				</label>
				<label>
					Email
					<input name="email" type="email" />
				</label>
				<button type="submit">Send</button>
			</form>
		</form-saver>

		<script type="module">
			import { FormSaverElement } from 'https://esm.sh/@aarongustafson/form-saver@0.0.1/form-saver.js?bundle&target=es2022';

			if (!customElements.get('form-saver')) {
				customElements.define('form-saver', FormSaverElement);
			}
		</script>
	</body>
</html>
