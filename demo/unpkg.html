<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>form-saver via unpkg</title>
		<link rel="stylesheet" href="./styles.css" />
		<style>
			/* Demo-specific styles */
		</style>
	</head>
	<body>
		<h1>unpkg CDN sanity check</h1>
		<p>
			This page loads the guarded definition helper from
			<code>unpkg</code> and registers the element when supported.
		</p>

		<form-saver>
			<form action="/demo-contact" method="post">
				<label>
					Name
					<input name="name" />
				</label>
				<label>
					Email
					<input name="email" type="email" />
				</label>
				<button type="submit">Send</button>
			</form>
		</form-saver>

		<script type="module">
			import { defineComponentName } from 'https://unpkg.com/@aarongustafson/form-saver@latest/define.js?module';

			defineComponentName();
		</script>
	</body>
</html>
